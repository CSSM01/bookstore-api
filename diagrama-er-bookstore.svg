<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fa" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Diagrama Entidad-Relación — bookstore-api</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#cccccc" stroke-width="1"/>

  <!-- ===== ENTITIES ===== -->

  <!-- User -->
  <rect x="40" y="240" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <text x="105" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="white">User</text>

  <!-- Order -->
  <rect x="240" y="240" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <text x="305" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Order</text>

  <!-- OrderItem -->
  <rect x="440" y="240" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <text x="505" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="white">OrderItem</text>

  <!-- Book -->
  <rect x="640" y="240" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <text x="705" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Book</text>

  <!-- Author -->
  <rect x="640" y="100" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#e07b39" stroke-width="2"/>
  <text x="705" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Author</text>

  <!-- Category -->
  <rect x="640" y="390" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#e07b39" stroke-width="2"/>
  <text x="705" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Category</text>

  <!-- ===== RELATIONSHIPS (lines) ===== -->

  <!-- User → Order (1 to N) -->
  <line x1="170" y1="265" x2="240" y2="265" stroke="#4a90d9" stroke-width="2"/>
  <text x="192" y="257" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="228" y="257" text-anchor="middle" font-size="12" fill="#333">N</text>

  <!-- Order → OrderItem (1 to N) -->
  <line x1="370" y1="265" x2="440" y2="265" stroke="#4a90d9" stroke-width="2"/>
  <text x="392" y="257" text-anchor="middle" font-size="12" fill="#333">1</text>
  <text x="428" y="257" text-anchor="middle" font-size="12" fill="#333">N</text>

  <!-- OrderItem → Book (N to 1) -->
  <line x1="570" y1="265" x2="640" y2="265" stroke="#4a90d9" stroke-width="2"/>
  <text x="592" y="257" text-anchor="middle" font-size="12" fill="#333">N</text>
  <text x="628" y="257" text-anchor="middle" font-size="12" fill="#333">1</text>

  <!-- Book → Author (N to 1) -->
  <line x1="705" y1="240" x2="705" y2="150" stroke="#e07b39" stroke-width="2"/>
  <text x="718" y="210" text-anchor="start" font-size="12" fill="#333">N</text>
  <text x="718" y="168" text-anchor="start" font-size="12" fill="#333">1</text>

  <!-- Book ↔ Category (N to N) -->
  <line x1="705" y1="290" x2="705" y2="390" stroke="#e07b39" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="718" y="315" text-anchor="start" font-size="12" fill="#333">N</text>
  <text x="718" y="378" text-anchor="start" font-size="12" fill="#333">N</text>

  <!-- ===== FIELDS per entity ===== -->

  <!-- User fields -->
  <rect x="40" y="300" width="130" height="110" rx="0 0 8 8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="40" y1="320" x2="170" y2="320" stroke="#4a90d9" stroke-width="1"/>
  <text x="52" y="315" font-size="11" fill="#888">PK</text>
  <text x="75" y="315" font-size="11" fill="#333">id</text>
  <text x="52" y="335" font-size="11" fill="#333">name</text>
  <text x="52" y="350" font-size="11" fill="#333">email</text>
  <text x="52" y="365" font-size="11" fill="#333">password</text>
  <text x="52" y="380" font-size="11" fill="#333">role</text>
  <text x="52" y="395" font-size="11" fill="#888">ENUM(USER,ADMIN)</text>

  <!-- Order fields -->
  <rect x="240" y="300" width="130" height="110" rx="0 0 8 8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="240" y1="320" x2="370" y2="320" stroke="#4a90d9" stroke-width="1"/>
  <text x="252" y="315" font-size="11" fill="#888">PK</text>
  <text x="275" y="315" font-size="11" fill="#333">id</text>
  <text x="252" y="335" font-size="11" fill="#888">FK</text>
  <text x="275" y="335" font-size="11" fill="#333">user_id</text>
  <text x="252" y="350" font-size="11" fill="#333">status</text>
  <text x="252" y="365" font-size="11" fill="#333">total</text>
  <text x="252" y="380" font-size="11" fill="#333">createdAt</text>
  <text x="252" y="395" font-size="11" fill="#888">ENUM(PENDING...)</text>

  <!-- OrderItem fields -->
  <rect x="440" y="300" width="130" height="110" rx="0 0 8 8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="440" y1="320" x2="570" y2="320" stroke="#4a90d9" stroke-width="1"/>
  <text x="452" y="315" font-size="11" fill="#888">PK</text>
  <text x="475" y="315" font-size="11" fill="#333">id</text>
  <text x="452" y="335" font-size="11" fill="#888">FK</text>
  <text x="475" y="335" font-size="11" fill="#333">order_id</text>
  <text x="452" y="350" font-size="11" fill="#888">FK</text>
  <text x="475" y="350" font-size="11" fill="#333">book_id</text>
  <text x="452" y="365" font-size="11" fill="#333">quantity</text>
  <text x="452" y="380" font-size="11" fill="#333">subtotal</text>

  <!-- Book fields -->
  <rect x="640" y="300" width="130" height="130" rx="0 0 8 8" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <line x1="640" y1="320" x2="770" y2="320" stroke="#4a90d9" stroke-width="1"/>
  <text x="652" y="315" font-size="11" fill="#888">PK</text>
  <text x="675" y="315" font-size="11" fill="#333">id</text>
  <text x="652" y="335" font-size="11" fill="#333">title</text>
  <text x="652" y="350" font-size="11" fill="#333">isbn</text>
  <text x="652" y="365" font-size="11" fill="#333">price</text>
  <text x="652" y="380" font-size="11" fill="#333">stock</text>
  <text x="652" y="395" font-size="11" fill="#333">description</text>
  <text x="652" y="410" font-size="11" fill="#888">FK</text>
  <text x="675" y="410" font-size="11" fill="#333">author_id</text>

  <!-- Author fields -->
  <rect x="640" y="160" width="130" height="80" rx="0 0 8 8" fill="white" stroke="#e07b39" stroke-width="1.5"/>
  <line x1="640" y1="175" x2="770" y2="175" stroke="#e07b39" stroke-width="1"/>
  <text x="652" y="170" font-size="11" fill="#888">PK</text>
  <text x="675" y="170" font-size="11" fill="#333">id</text>
  <text x="652" y="188" font-size="11" fill="#333">name</text>
  <text x="652" y="203" font-size="11" fill="#333">biography</text>
  <text x="652" y="218" font-size="11" fill="#333">email</text>
  <text x="652" y="233" font-size="11" fill="#333">books (1:N)</text>

  <!-- Category fields -->
  <rect x="640" y="450" width="130" height="80" rx="0 0 8 8" fill="white" stroke="#e07b39" stroke-width="1.5"/>
  <line x1="640" y1="465" x2="770" y2="465" stroke="#e07b39" stroke-width="1"/>
  <text x="652" y="460" font-size="11" fill="#888">PK</text>
  <text x="675" y="460" font-size="11" fill="#333">id</text>
  <text x="652" y="478" font-size="11" fill="#333">name</text>
  <text x="652" y="493" font-size="11" fill="#333">description</text>
  <text x="652" y="510" font-size="11" fill="#888">book_categories</text>
  <text x="652" y="523" font-size="11" fill="#888">(tabla pivot)</text>

  <!-- Legend -->
  <rect x="40" y="545" width="300" height="55" rx="6" fill="white" stroke="#cccccc" stroke-width="1"/>
  <text x="55" y="563" font-size="12" font-weight="bold" fill="#333">Leyenda</text>
  <line x1="55" y1="572" x2="200" y2="572" stroke="#4a90d9" stroke-width="2"/>
  <text x="210" y="576" font-size="11" fill="#333">Relación principal</text>
  <line x1="55" y1="588" x2="200" y2="588" stroke="#e07b39" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="210" y="592" font-size="11" fill="#333">Relación ManyToMany</text>

  <!-- Arrowheads -->
  <!-- Arrow Order end -->
  <polygon points="240,265 250,260 250,270" fill="#4a90d9"/>
  <!-- Arrow OrderItem end -->
  <polygon points="440,265 450,260 450,270" fill="#4a90d9"/>
  <!-- Arrow Book end -->
  <polygon points="640,265 650,260 650,270" fill="#4a90d9"/>
  <!-- Arrow Author end (up) -->
  <polygon points="705,150 700,162 710,162" fill="#e07b39"/>
  <!-- Arrow Category end (down) -->
  <polygon points="705,390 700,378 710,378" fill="#e07b39"/>
</svg>
